name: Publish to Packagist

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, zip

      - name: Install Composer
        run: composer install --no-dev --optimize-autoloader

      - name: Validate
        run: composer validate --strict

      - name: Publish to Packagist
        run: |
          # Update Packagist via API using composer command
          # Note: packagist-action doesn't exist, using direct API approach
          PACKAGIST_TOKEN="${{ secrets.PACKAGIST_API_TOKEN }}"
          API_URL="https://packagist.org/api/github"
          curl -s -X POST \
            -H "Authorization: Bearer $PACKAGIST_TOKEN" \
            "https://packagist.org/api/github?repository=SuperInstance/flux-vm-php"
