name: Publish to Packagist

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, zip

      - name: Validate composer.json
        run: composer validate --strict

      - name: Publish to Packagist
        run: |
          curl -XPOST \
            'https://packagist.org/api/update-package?username=superinstance&apiToken=${{ secrets.PACKAGIST_API_TOKEN }}' \
            -H 'content-type:application/json' \
            -d '{"repository":{"url":"https://github.com/SuperInstance/flux-vm-php"}}'
